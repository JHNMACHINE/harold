<!DOCTYPE html>
<html lang="it"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Harold</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital@0;1&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0c0c0f;--sur:#141418;--bor:#2a2a32;
  --ac:#7c6af7;--ac2:#c084fc;
  --tx:#e8e6f0;--mu:#6b6880;
  --ubg:#1e1b2e;--mbg:#2a1a3e;--mtx:#b07fe8;
  --r:12px;--fd:'Syne',sans-serif;--fm:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:var(--fm);font-size:14px;height:100dvh;display:flex;flex-direction:column;overflow:hidden}

/* ── LOGIN ── */
#ls{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2rem;padding:2rem}
.logo{font-family:var(--fd);font-size:clamp(3rem,10vw,6rem);font-weight:800;letter-spacing:-.03em;background:linear-gradient(135deg,var(--ac),var(--ac2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sub{color:var(--mu);font-size:12px;letter-spacing:.15em;text-transform:uppercase}
.lbox{display:flex;flex-direction:column;gap:.75rem;width:100%;max-width:360px}
input[type=password]{background:var(--sur);border:1px solid var(--bor);border-radius:var(--r);color:var(--tx);font-family:var(--fm);font-size:14px;padding:.75rem 1rem;outline:none;transition:border-color .2s;width:100%}
input[type=password]:focus{border-color:var(--ac)}
.btn{background:var(--ac);border:none;border-radius:var(--r);color:#fff;cursor:pointer;font-family:var(--fd);font-size:14px;font-weight:600;padding:.75rem;transition:opacity .15s,transform .1s;width:100%}
.btn:hover{opacity:.88}.btn:active{transform:scale(.98)}.btn:disabled{opacity:.4;cursor:not-allowed}
.err{color:#f87171;font-size:12px;text-align:center;min-height:1.2em}

/* ── CHAT ── */
#cs{display:none;flex-direction:column;height:100dvh}
header{align-items:center;border-bottom:1px solid var(--bor);display:flex;justify-content:space-between;padding:.875rem 1.25rem;flex-shrink:0}
.hl{font-family:var(--fd);font-size:1.25rem;font-weight:800;background:linear-gradient(135deg,var(--ac),var(--ac2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hr{display:flex;align-items:center;gap:1rem}
.badge{background:var(--sur);border:1px solid var(--bor);border-radius:99px;color:var(--mu);font-size:11px;padding:3px 10px}
.lo{background:none;border:1px solid var(--bor);border-radius:var(--r);color:var(--mu);cursor:pointer;font-family:var(--fm);font-size:12px;padding:4px 10px;transition:color .15s,border-color .15s}
.lo:hover{color:var(--tx);border-color:var(--ac)}

/* ── MESSAGGI ── */
#msgs{flex:1;overflow-y:auto;padding:1.5rem 1rem;display:flex;flex-direction:column;gap:1rem;scrollbar-width:thin;scrollbar-color:var(--bor) transparent}
.msg{display:flex;gap:.75rem;max-width:720px;animation:fu .2s ease}
@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg.u{align-self:flex-end;flex-direction:row-reverse}
.msg.b{align-self:flex-start;width:100%;max-width:720px}
.av{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;margin-top:2px}
.msg.u .av{background:var(--ac);color:#fff}
.msg.b .av{background:var(--sur);border:1px solid var(--bor);color:var(--mu)}
.bub{border-radius:var(--r);line-height:1.65;padding:.65rem .9rem;word-break:break-word;border:1px solid var(--bor)}
.msg.u .bub{
    background:var(--ubg);
    border-color:#2e2a4a;
    max-width:calc(100% - 44px);
    min-width:60px;          /* ← aggiunge questo */
    word-break:break-word;
}
.msg.b .bub{background:var(--sur);width:100%}
.meta{color:var(--mu);font-size:10px;margin-top:4px}

/* ── DIFFUSION DISPLAY ── */
.sinfo{display:flex;justify-content:space-between;font-size:10px;color:var(--mu);margin-bottom:4px}
.prog{height:2px;background:var(--bor);border-radius:1px;margin-bottom:8px;overflow:hidden}
.progb{height:100%;background:linear-gradient(90deg,var(--ac),var(--ac2));border-radius:1px;transition:width .15s}
.dtoks{font-size:13px;line-height:2.1;word-break:break-word}

/* token mascherato — lampeggia viola */
.tk.m{
  display:inline-block;
  background:var(--mbg);
  color:var(--mtx);
  border-radius:3px;
  padding:0 4px;
  margin:0 1px;
  font-style:italic;
  animation:pu .9s ease-in-out infinite;
}
@keyframes pu{0%,100%{opacity:.4;transform:scaleY(.9)}50%{opacity:1;transform:scaleY(1)}}

/* token rivelato — appare con fade */
.tk.r{display:inline;color:var(--tx)}
.tk.r.new{animation:reveal .3s ease}
@keyframes reveal{from{opacity:0;color:var(--ac2)}to{opacity:1;color:var(--tx)}}

/* token prompt — grigio corsivo */
.tk.p{display:inline;color:var(--mu);font-style:italic}

/* ── INPUT ── */
#ia{border-top:1px solid var(--bor);padding:.875rem 1rem;display:flex;flex-direction:column;gap:.5rem;flex-shrink:0}
#ir{display:flex;gap:.5rem;align-items:flex-end}
textarea{flex:1;background:var(--sur);border:1px solid var(--bor);border-radius:var(--r);color:var(--tx);font-family:var(--fm);font-size:14px;line-height:1.5;max-height:120px;outline:none;overflow-y:auto;padding:.65rem .9rem;resize:none;transition:border-color .2s}
textarea:focus{border-color:var(--ac)}
#sb{background:var(--ac);border:none;border-radius:var(--r);color:#fff;cursor:pointer;font-size:16px;height:40px;width:40px;flex-shrink:0;transition:opacity .15s,transform .1s}
#sb:hover{opacity:.85}#sb:active{transform:scale(.95)}#sb:disabled{opacity:.35;cursor:not-allowed}
.ctrl{display:flex;gap:.75rem;align-items:center;flex-wrap:wrap}
.cg{display:flex;align-items:center;gap:.4rem}
.cl{color:var(--mu);font-size:11px}
.cv{color:var(--ac2);font-size:11px;min-width:28px}
select{background:var(--sur);border:1px solid var(--bor);border-radius:6px;color:var(--tx);font-family:var(--fm);font-size:11px;padding:2px 6px;outline:none}
input[type=range]{width:80px;accent-color:var(--ac)}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.5rem;color:var(--mu);pointer-events:none;user-select:none}
.empty .big{font-family:var(--fd);font-size:2rem;font-weight:800;color:var(--bor)}
</style></head><body>

<!-- LOGIN -->
<div id="ls">
  <div class="logo">Harold</div>
  <div class="sub">Diffusion Language Model</div>
  <div class="lbox">
    <input type="password" id="pwd" placeholder="password" autocomplete="current-password">
    <button class="btn" onclick="doLogin()">Accedi</button>
    <div class="err" id="le"></div>
  </div>
</div>

<!-- CHAT -->
<div id="cs">
  <header>
    <div class="hl">Harold</div>
    <div class="hr">
      <span class="badge">DiffusionMoE · 61M</span>
      <button class="lo" onclick="doLogout()">esci</button>
    </div>
  </header>

  <div id="msgs">
    <div class="empty" id="emp">
      <div class="big">harold</div>
      <div>scrivi qualcosa per iniziare</div>
    </div>
  </div>

  <div id="ia">
    <div class="ctrl">
      <div class="cg"><span class="cl">mode</span>
        <select id="cm">
          <option value="confidence">confidence</option>
          <option value="sample">sample</option>
          <option value="argmax">argmax</option>
        </select>
      </div>
      <div class="cg"><span class="cl">temp</span>
        <input type="range" id="ct" min="0.5" max="2.0" step="0.1" value="1.0"
               oninput="document.getElementById('ctv').textContent=parseFloat(this.value).toFixed(1)">
        <span class="cv" id="ctv">1.0</span>
      </div>
      <div class="cg"><span class="cl">steps</span>
        <input type="range" id="cst" min="8" max="64" step="4" value="16" ...>
        <span class="cv" id="csv">16</span>
      </div>
      <div class="cg"><span class="cl">len</span>
        <input type="range" id="cln" min="32" max="256" step="16" value="48" ...>
        <span class="cv" id="clv">48</span>
      </div>
    </div>
    <div id="ir">
      <textarea id="mi" rows="1" placeholder="scrivi un messaggio…"
                onkeydown="hk(event)" oninput="ar(this)"></textarea>
      <button id="sb" onclick="doSend()">↑</button>
    </div>
  </div>
</div>

<script>
let TOK = localStorage.getItem('ht') || '';
if (TOK) fetch('/health', {headers:{Authorization:'Bearer '+TOK}}).then(r => { if(r.ok) showChat(); });

async function doLogin() {
  const p = document.getElementById('pwd').value;
  const e = document.getElementById('le');
  if (!p) return;
  e.textContent = '';
  try {
    const r = await fetch('/login', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({password: p})
    });
    const d = await r.json();
    if (!r.ok) { e.textContent = d.detail || 'Errore'; return; }
    TOK = d.token;
    localStorage.setItem('ht', TOK);
    showChat();
  } catch { e.textContent = 'Connessione fallita'; }
}

function doLogout() {
  TOK = '';
  localStorage.removeItem('ht');
  document.getElementById('cs').style.display = 'none';
  document.getElementById('ls').style.display = 'flex';
  document.getElementById('msgs').innerHTML =
    '<div class="empty" id="emp"><div class="big">harold</div><div>scrivi qualcosa per iniziare</div></div>';
}

function showChat() {
  document.getElementById('ls').style.display = 'none';
  document.getElementById('cs').style.display = 'flex';
  document.getElementById('mi').focus();
}

function hk(e) { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); doSend(); } }
function ar(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,120)+'px'; }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }

function addUserMsg(text) {
  const e = document.getElementById('emp'); if (e) e.remove();
  const m = document.getElementById('msgs');
  const d = document.createElement('div');
  d.className = 'msg u';
  d.innerHTML = `<div class="av">tu</div><div><div class="bub">${esc(text)}</div></div>`;
  m.appendChild(d);
  m.scrollTop = m.scrollHeight;
}

function createBotMsg() {
  const e = document.getElementById('emp'); if (e) e.remove();
  const m = document.getElementById('msgs');
  const d = document.createElement('div');
  d.className = 'msg b'; d.id = 'bc';
  d.innerHTML = `
    <div class="av">H</div>
    <div style="flex:1;min-width:0">
      <div class="bub">
        <div class="sinfo">
          <span id="sl">inizializzazione…</span>
          <span id="mc" style="color:var(--mtx)"></span>
        </div>
        <div class="prog"><div class="progb" id="pb" style="width:0%"></div></div>
        <div class="dtoks" id="dd"></div>
      </div>
      <div class="meta" id="bm"></div>
    </div>`;
  m.appendChild(d);
  m.scrollTop = m.scrollHeight;
}

// Tiene traccia dei token precedenti per animare solo i nuovi rivelati
let _prevTokens = [];

function renderToks(toks, pl) {
  const d = document.getElementById('dd');
  if (!d) return;
  let html = '';
  toks.forEach((t, i) => {
    if (i < pl) {
      html += `<span class="tk p">${esc(t)} </span>`;
    } else if (t === '▒') {
      html += `<span class="tk m">▒</span>`;
    } else {
      // Token appena rivelato? Aggiunge classe 'new' per animazione
      const isNew = _prevTokens[i] === '▒' || _prevTokens[i] === undefined;
      const cls   = isNew ? 'tk r new' : 'tk r';
      const text  = t === '·' ? ' ' : esc(t);
      html += `<span class="${cls}">${text} </span>`;
    }
  });
  _prevTokens = [...toks];
  d.innerHTML  = html;
}

async function doSend() {
  const mi  = document.getElementById('mi');
  const text = mi.value.trim();
  if (!text) return;
  const sb = document.getElementById('sb');
  sb.disabled = true;
  mi.value = '';
  mi.style.height = 'auto';
  _prevTokens = [];

  addUserMsg(text);
  createBotMsg();

  const mode  = document.getElementById('cm').value;
  const temp  = parseFloat(document.getElementById('ct').value);
  const steps = parseInt(document.getElementById('cst').value);
  const len   = parseInt(document.getElementById('cln').value);
  const t0    = Date.now();

  try {
    const r = await fetch('/chat/stream', {
      method: 'POST',
      headers: {'Content-Type':'application/json','Authorization':'Bearer '+TOK},
      body: JSON.stringify({message:text, temperature:temp, steps, gen_len:len, mode})
    });

    if (r.status === 401) { doLogout(); return; }

    const reader  = r.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      buf += decoder.decode(value, {stream:true});
      const lines = buf.split('\n');
      buf = lines.pop() || '';

      for (const ln of lines) {
        if (!ln.startsWith('data:')) continue;
        const raw = ln.slice(5).trim();
        if (raw === '[DONE]') break;
        let ev;
        try { ev = JSON.parse(raw); } catch { continue; }

        if (ev.type === 'step') {
          const pct = Math.round(ev.step / ev.total_steps * 100);
          const pb  = document.getElementById('pb');
          const sl  = document.getElementById('sl');
          const mc  = document.getElementById('mc');
          if (pb) pb.style.width = pct + '%';
          if (sl) sl.textContent = `step ${ev.step}/${ev.total_steps}`;
          if (mc) mc.textContent = ev.n_masked > 0 ? `▒ ${ev.n_masked}` : '✓ completato';
          renderToks(ev.tokens, ev.prompt_len);
          document.getElementById('msgs').scrollTop = 99999;
        }

        else if (ev.type === 'done') {
          // Sostituisce l'animazione con il testo finale pulito
          const bub = document.getElementById('bc')?.querySelector('.bub');
          if (bub) bub.innerHTML = `<div class="dtoks" style="line-height:1.7">${esc(ev.response)}</div>`;
          const bm = document.getElementById('bm');
          if (bm) bm.textContent = `${Date.now()-t0}ms · ${mode} · temp=${temp} · steps=${steps}`;
          const bc = document.getElementById('bc');
          if (bc) bc.removeAttribute('id');
        }

        else if (ev.type === 'error') {
          const dd = document.getElementById('dd');
          if (dd) dd.textContent = '⚠ ' + ev.detail;
        }
      }
    }

  } catch (err) {
    const dd = document.getElementById('dd');
    if (dd) dd.textContent = '⚠ Connessione persa';
  } finally {
    sb.disabled = false;
    document.getElementById('mi').focus();
  }
}

document.getElementById('pwd')?.addEventListener('keydown', e => { if (e.key==='Enter') doLogin(); });
</script>
</body></html>
