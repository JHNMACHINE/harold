# Harold v0.6 — Dataset Configuration
# =====================================

# ─────────────────────────────────────────────────────────────────────────────
# Pretraining — mix minimo ad alta qualità
# ─────────────────────────────────────────────────────────────────────────────

pretraining:

  - name: fineweb
    path: HuggingFaceFW/fineweb-edu
    config: CC-MAIN-2024-10
    split: train
    text_field: text
    weight: 0.50

  - name: slimpajama
    path: DKYoon/SlimPajama-6B
    split: train
    text_field: text
    weight: 0.35

  - name: wikipedia
    path: wikimedia/wikipedia
    config: 20231101.en
    split: train
    text_field: text
    weight: 0.15

# ─────────────────────────────────────────────────────────────────────────────
# SFT — mix minimo
# ─────────────────────────────────────────────────────────────────────────────

sft:

  - name: tulu3
    path: allenai/tulu-3-sft-mixture
    split: train
    weight: 0.60
    structure: multiturn
    fields:
      messages: messages
      role_field: role
      content_field: content
      assistant_role: assistant

  - name: openorca
    path: Open-Orca/OpenOrca
    split: train
    weight: 0.40
    structure: pairs
    fields:
      context: [system_prompt, question]
      separator: " User: "
      response: response