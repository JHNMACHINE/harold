# Harold v0.7 — Dataset Configuration
# =====================================
# Modifica questo file per cambiare dataset senza toccare il codice Python.
#
# Campi per ogni dataset:
#   name:       identificatore univoco (usato nei log e nei pesi)
#   path:       HuggingFace dataset path
#   config:     (opzionale) nome della configurazione HF
#   split:      split HF da usare ("train", "train[:10%]", ecc.)
#   text_field: campo del dataset contenente il testo
#   weight:     proporzione nel mix (devono sommare a 1.0)
#   format:     (opzionale) handler speciale per formati non-standard
#               valori: "standard" (default), "codecontests", "oasst2", "openorca"
#
# I pesi devono sommare a 1.0 per sezione (pretraining e sft separatamente).

# ─────────────────────────────────────────────────────────────────────────────
# Pretraining
# ─────────────────────────────────────────────────────────────────────────────
#
# Mix aggiornato per Harold v0.7 — target: edge/IoT deployment
#
# Obiettivo: modello ottimizzato per assistenti embedded su dispositivi
# piccoli (smartphone, microcontroller, Raspberry Pi, Jetson).
# Il mix privilegia codice (logica, scripting, sistemi embedded) rispetto
# a contenuto lungo e letterario (pg19, arxiv ridotti drasticamente).
#
# Modifiche rispetto al mix general-purpose precedente:
#   + github-code: 3% → 25%  (codice Python, JS, C, C++, Rust, Bash)
#   + the-stack-c-rust: nuovo — linguaggi embedded e sistemi
#   - pg19: 12% → 2%          (narrativa lunga, non utile per edge)
#   - arxiv: 9% → 3%          (paper accademici, meno rilevanti)
#   - slimpajama: 20% → 15%   (diversità mantenuta ma ridotta)
#   - c4: 13% → 10%           (web text generale ridotto)
#   - wikipedia: 15% → 10%    (conoscenza fattuale base mantenuta)
#   - fineweb: 25% → 20%      (qualità alta ma ridotto per fare spazio)
#   + open-web-math: 3% → 5%  (ragionamento matematico utile per logica IoT)

pretraining:

  - name: fineweb
    path: HuggingFaceFW/fineweb-edu
    config: CC-MAIN-2024-10
    split: train
    text_field: text
    weight: 0.20

  - name: wikipedia
    path: wikimedia/wikipedia
    config: 20231101.en
    split: train
    text_field: text
    weight: 0.10

  - name: slimpajama
    path: DKYoon/SlimPajama-6B
    split: train
    text_field: text
    weight: 0.15

  - name: c4
    path: allenai/c4
    config: en
    split: train
    text_field: text
    weight: 0.10

  - name: arxiv
    path: ccdv/arxiv-summarization
    split: train
    text_field: article
    weight: 0.03

  - name: pg19
    path: emozilla/pg19
    split: train
    text_field: text
    weight: 0.02

  # Codice generale — 30+ linguaggi, grande e non esauribile
  # Focus principale per edge/IoT: logica, scripting, API calls
  - name: github-code
    path: macrocosm-os/code-parrot-github-code
    split: train
    text_field: content
    weight: 0.25

  # Linguaggi sistemi/embedded: C, C++, Rust, Bash, Go
  # Critici per IoT: driver, firmware, microcontroller code
  - name: the-stack-systems
    path: bigcode/the-stack-dedup
    config: C
    split: train
    text_field: content
    weight: 0.05

  - name: the-stack-cpp
    path: bigcode/the-stack-dedup
    config: C++
    split: train
    text_field: content
    weight: 0.03

  - name: the-stack-rust
    path: bigcode/the-stack-dedup
    config: Rust
    split: train
    text_field: content
    weight: 0.02

  - name: open_web_math
    path: open-web-math/open-web-math
    split: train
    text_field: text
    weight: 0.05

# Totale pesi pretraining: 1.00
# fineweb(0.20) + wikipedia(0.10) + slimpajama(0.15) + c4(0.10) +
# arxiv(0.03) + pg19(0.02) + github-code(0.25) + the-stack-c(0.05) +
# the-stack-cpp(0.03) + the-stack-rust(0.02) + math(0.05) = 1.00

# ─────────────────────────────────────────────────────────────────────────────
# SFT (Supervised Fine-Tuning)
# ─────────────────────────────────────────────────────────────────────────────
#
# Mix aggiornato per target edge/IoT:
#   + glaive-code-assistant: nuovo — Q&A su codice, ideale per assistente embedded
#   + oss-instruct: nuovo — istruzioni su codice open-source reale
#   - openorca ridotto per fare spazio a dataset code-focused
#
# L'obiettivo SFT è un assistente che risponde a domande tecniche,
# scrive codice per sistemi embedded, e interagisce in modo conciso
# (importante su device con risorse limitate).

sft:

  - name: ultrafeedback
    path: HuggingFaceH4/ultrafeedback_binarized
    split: train_sft
    weight: 0.25
    structure: multiturn
    fields:
      messages: messages
      role_field: role
      content_field: content
      assistant_role: assistant

  - name: tulu3
    path: allenai/tulu-3-sft-mixture
    split: train
    weight: 0.25
    structure: multiturn
    fields:
      messages: messages
      role_field: role
      content_field: content
      assistant_role: assistant

  - name: magpie_ultra
    path: argilla/magpie-ultra-v0.1
    split: train
    weight: 0.10
    structure: pairs
    fields:
      context: instruction
      response: response

  - name: openorca
    path: Open-Orca/OpenOrca
    split: train
    weight: 0.10
    structure: pairs
    fields:
      context: [system_prompt, question]
      separator: " User: "
      response: response

  # Codice e sistemi — priorità per assistente edge/IoT
  - name: glaive-code-assistant
    path: glaiveai/glaive-code-assistant-v3
    split: train
    weight: 0.20
    structure: pairs
    fields:
      context: question
      response: answer

  - name: oss-instruct
    path: ise-uiuc/Magicoder-OSS-Instruct-75K
    split: train
    weight: 0.10
    structure: pairs
    fields:
      context: problem
      response: solution

# Totale pesi SFT: 1.00
# ultrafeedback(0.25) + tulu3(0.25) + magpie(0.10) +
# openorca(0.10) + glaive-code(0.20) + oss-instruct(0.10) = 1.00