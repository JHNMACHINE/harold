# Harold v0.7 — Dataset Configuration
# =====================================
# Modifica questo file per cambiare dataset senza toccare il codice Python.
#
# Campi per ogni dataset:
#   name:       identificatore univoco (usato nei log e nei pesi)
#   path:       HuggingFace dataset path
#   config:     (opzionale) nome della configurazione HF
#   split:      split HF da usare ("train", "train[:10%]", ecc.)
#   text_field: campo del dataset contenente il testo
#   weight:     proporzione nel mix (devono sommare a 1.0)
#   data_dir:   (opzionale) subdirectory del dataset HF (per starcoderdata, ecc.)
#   format:     (opzionale) handler speciale per formati non-standard
#               valori: "standard" (default), "codecontests", "oasst2", "openorca"
#
# I pesi devono sommare a 1.0 per sezione (pretraining e sft separatamente).

# ─────────────────────────────────────────────────────────────────────────────
# Pretraining
# ─────────────────────────────────────────────────────────────────────────────
#
# Mix aggiornato per Harold v0.7 — target: edge/IoT deployment
#
# FIX rispetto alla versione precedente:
#   - macrocosm-os/code-parrot-github-code: rimosso — config per linguaggio
#     non supportato, campo "code" (non "content"), richiede languages=[] in Python
#   - bigcode/the-stack-dedup con config "C"/"C++"/"Rust": rimosso — usa
#     data_dir="data/c" non config, e richiede accettazione licenza gated
#
# Sostituzione: bigcode/starcoderdata — supporta data_dir per linguaggio,
#   campo "content", 86 linguaggi, dedup + PII removal, no gating.
#   Ref: load_dataset("bigcode/starcoderdata", data_dir="python", split="train")
#
# AGGIORNAMENTO v0.7.1: aggiunto C++ tramite data_dir="cpp"

pretraining:

  - name: fineweb
    path: HuggingFaceFW/fineweb-edu
    config: CC-MAIN-2024-10
    split: train
    text_field: text
    weight: 0.20

  - name: wikipedia
    path: wikimedia/wikipedia
    config: 20231101.en
    split: train
    text_field: text
    weight: 0.10

  - name: slimpajama
    path: DKYoon/SlimPajama-6B
    split: train
    text_field: text
    weight: 0.15

  - name: c4
    path: allenai/c4
    config: en
    split: train
    text_field: text
    weight: 0.10

  - name: arxiv
    path: ccdv/arxiv-summarization
    split: train
    text_field: article
    weight: 0.03

  - name: pg19
    path: emozilla/pg19
    split: train
    text_field: text
    weight: 0.02

  # ── Codice (bigcode/starcoderdata) ──
  # Pulito, dedup, PII-filtered. Usa data_dir per selezionare il linguaggio.
  # NOTA: il loader deve passare data_dir a load_dataset() se presente nel YAML.
  #       Se il loader non supporta data_dir, aggiungi in _iter_pretraining_dataset:
  #         if 'data_dir' in ds_cfg:
  #             load_kwargs['data_dir'] = ds_cfg['data_dir']

  - name: starcoderdata-python
    path: bigcode/starcoderdata
    data_dir: python
    split: train
    text_field: content
    weight: 0.12

  - name: starcoderdata-javascript
    path: bigcode/starcoderdata
    data_dir: javascript
    split: train
    text_field: content
    weight: 0.05

  - name: starcoderdata-c
    path: bigcode/starcoderdata
    data_dir: c
    split: train
    text_field: content
    weight: 0.05      # Ridotto da 0.09 per fare spazio a C++

  - name: starcoderdata-cpp
    path: bigcode/starcoderdata
    data_dir: cpp
    split: train
    text_field: content
    weight: 0.04      # Aggiunto per copertura C++ (edge/IoT)

  - name: starcoderdata-rust
    path: bigcode/starcoderdata
    data_dir: rust
    split: train
    text_field: content
    weight: 0.03

  - name: starcoderdata-go
    path: bigcode/starcoderdata
    data_dir: go
    split: train
    text_field: content
    weight: 0.03

  - name: starcoderdata-shell
    path: bigcode/starcoderdata
    data_dir: shell
    split: train
    text_field: content
    weight: 0.03

  - name: open_web_math
    path: open-web-math/open-web-math
    split: train
    text_field: text
    weight: 0.05

# Totale pesi pretraining: 1.00
# fineweb(0.20) + wikipedia(0.10) + slimpajama(0.15) + c4(0.10) +
# arxiv(0.03) + pg19(0.02) +
# python(0.12) + js(0.05) + c(0.05) + cpp(0.04) + rust(0.03) + go(0.03) + shell(0.03) +
# math(0.05) = 1.00

# ─────────────────────────────────────────────────────────────────────────────
# SFT (Supervised Fine-Tuning)
# ─────────────────────────────────────────────────────────────────────────────

sft:

  - name: ultrafeedback
    path: HuggingFaceH4/ultrafeedback_binarized
    split: train_sft
    weight: 0.25
    structure: multiturn
    fields:
      messages: messages
      role_field: role
      content_field: content
      assistant_role: assistant

  - name: tulu3
    path: allenai/tulu-3-sft-mixture
    split: train
    weight: 0.25
    structure: multiturn
    fields:
      messages: messages
      role_field: role
      content_field: content
      assistant_role: assistant

  - name: magpie_ultra
    path: argilla/magpie-ultra-v0.1
    split: train
    weight: 0.10
    structure: pairs
    fields:
      context: instruction
      response: response

  - name: openorca
    path: Open-Orca/OpenOrca
    split: train
    weight: 0.10
    structure: pairs
    fields:
      context: [system_prompt, question]
      separator: " User: "
      response: response

  - name: glaive-code-assistant
    path: glaiveai/glaive-code-assistant-v3
    split: train
    weight: 0.20
    structure: pairs
    fields:
      context: question
      response: answer

  - name: oss-instruct
    path: ise-uiuc/Magicoder-OSS-Instruct-75K
    split: train
    weight: 0.10
    structure: pairs
    fields:
      context: problem
      response: solution

# Totale pesi SFT: 1.00
# ultrafeedback(0.25) + tulu3(0.25) + magpie(0.10) +
# openorca(0.10) + glaive-code(0.20) + oss-instruct(0.10) = 1.00