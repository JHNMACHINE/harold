# Harold v0.7 — Dataset Configuration
# =====================================
# Modifica questo file per cambiare dataset senza toccare il codice Python.
#
# Campi per ogni dataset:
#   name:       identificatore univoco (usato nei log e nei pesi)
#   path:       HuggingFace dataset path
#   config:     (opzionale) nome della configurazione HF
#   split:      split HF da usare ("train", "train[:10%]", ecc.)
#   text_field: campo del dataset contenente il testo
#   weight:     proporzione nel mix (devono sommare a 1.0)
#   format:     (opzionale) handler speciale per formati non-standard
#               valori: "standard" (default), "codecontests", "oasst2", "openorca"
#
# I pesi devono sommare a 1.0 per sezione (pretraining e sft separatamente).

# ─────────────────────────────────────────────────────────────────────────────
# Pretraining
# ─────────────────────────────────────────────────────────────────────────────
#
# Mix aggiornato per Harold v0.7 (3B):
#   - FineWeb-Edu + Wikipedia + C4: base general-purpose di alta qualità
#   - SlimPajama: diversità tematica e stilistica
#   - arxiv: paper scientifici, coerenza long-form su seq_len=4096
#   - pg19: libri Project Gutenberg, coerenza su sequenze lunghe
#   - github-code: sostituisce python_code — dataset pubblico, grande e vario
#                  codeparrot/github-code copre 30+ linguaggi, non si esaurisce
#                  config=Python per mantenere focus simile al precedente
#   - open-web-math: sostituisce openmath — matematica da CommonCrawl,
#                    molto più varia e meno ripetitiva di OpenMathInstruct
#
# Rimosso: python_code (flytech/python-codes-25k — 25k esempi, troppo piccolo)
# Rimosso: openmath (nvidia/OpenMathInstruct-1 — troppo strutturato per pretrain)
# Nota: bigcode/starcoderdata è gated — sostituito con codeparrot/github-code

pretraining:

  - name: fineweb
    path: HuggingFaceFW/fineweb-edu
    config: CC-MAIN-2024-10
    split: train
    text_field: text
    weight: 0.25

  - name: wikipedia
    path: wikimedia/wikipedia
    config: 20231101.en
    split: train
    text_field: text
    weight: 0.15

  - name: slimpajama
    path: DKYoon/SlimPajama-6B
    split: train
    text_field: text
    weight: 0.20

  - name: c4
    path: allenai/c4
    config: en
    split: train
    text_field: text
    weight: 0.13

  - name: arxiv
    path: ccdv/arxiv-summarization
    split: train
    text_field: article
    weight: 0.09

  - name: pg19
    path: emozilla/pg19
    split: train
    text_field: text
    weight: 0.12

  - name: github_code
    path: codeparrot/github-code
    config: Python
    split: train
    text_field: code
    weight: 0.03

  - name: open_web_math
    path: open-web-math/open-web-math
    split: train
    text_field: text
    weight: 0.03

# ─────────────────────────────────────────────────────────────────────────────
# SFT (Supervised Fine-Tuning)
# ─────────────────────────────────────────────────────────────────────────────
#
# Mix invariato da v0.6 — già ottimale per 2025-2026.

sft:

  - name: ultrafeedback
    path: HuggingFaceH4/ultrafeedback_binarized
    split: train_sft
    weight: 0.35
    structure: multiturn
    fields:
      messages: messages
      role_field: role
      content_field: content
      assistant_role: assistant

  - name: tulu3
    path: allenai/tulu-3-sft-mixture
    split: train
    weight: 0.30
    structure: multiturn
    fields:
      messages: messages
      role_field: role
      content_field: content
      assistant_role: assistant

  - name: magpie_ultra
    path: argilla/magpie-ultra-v0.1
    split: train
    weight: 0.15
    structure: pairs
    fields:
      context: instruction
      response: response

  - name: openorca
    path: Open-Orca/OpenOrca
    split: train
    weight: 0.20
    structure: pairs
    fields:
      context: [system_prompt, question]
      separator: " User: "
      response: response