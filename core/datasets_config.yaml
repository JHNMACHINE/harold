# Harold v0.7 — Dataset Configuration
# =====================================
# Modifica questo file per cambiare dataset senza toccare il codice Python.
#
# Campi per ogni dataset:
#   name:       identificatore univoco (usato nei log e nei pesi)
#   path:       HuggingFace dataset path
#   config:     (opzionale) nome della configurazione HF
#   split:      split HF da usare ("train", "train[:10%]", ecc.)
#   text_field: campo del dataset contenente il testo
#   weight:     proporzione nel mix (devono sommare a 1.0)
#   format:     (opzionale) handler speciale per formati non-standard
#               valori: "standard" (default), "codecontests", "oasst2", "openorca"
#
# I pesi devono sommare a 1.0 per sezione (pretraining e sft separatamente).

# ─────────────────────────────────────────────────────────────────────────────
# Pretraining
# ─────────────────────────────────────────────────────────────────────────────
#
# Mix aggiornato per Harold v0.7 (3B):
#   - FineWeb-Edu + Wikipedia + C4: base general-purpose di alta qualità
#   - SlimPajama: diversità tematica e stilistica
#   - arxiv: paper scientifici, coerenza long-form su seq_len=4096
#   - pg19: libri Project Gutenberg, coerenza su sequenze lunghe
#   - starcoderdata: sostituisce python_code (25k esempi → dataset enorme e vario)
#                    bigcode/starcoderdata copre 80+ linguaggi, non si esaurisce
#   - open-web-math: sostituisce openmath — matematica da CommonCrawl,
#                    molto più vario e meno ripetitivo di OpenMathInstruct
#
# Rimosso: python_code (flytech/python-codes-25k — troppo piccolo per 3B,
#          si esaurisce in poche iterazioni e viene ricampionato continuamente)
# Rimosso: openmath (nvidia/OpenMathInstruct-1 — dataset di istruzioni,
#          troppo strutturato per pretraining, rischio overspecialization)

pretraining:

  - name: fineweb
    path: HuggingFaceFW/fineweb-edu
    config: CC-MAIN-2024-10
    split: train
    text_field: text
    weight: 0.25

  - name: wikipedia
    path: wikimedia/wikipedia
    config: 20231101.en
    split: train
    text_field: text
    weight: 0.15

  - name: slimpajama
    path: DKYoon/SlimPajama-6B
    split: train
    text_field: text
    weight: 0.20

  - name: c4
    path: allenai/c4
    config: en
    split: train
    text_field: text
    weight: 0.13

  - name: arxiv
    path: ccdv/arxiv-summarization
    split: train
    text_field: article
    weight: 0.09

  - name: pg19
    path: emozilla/pg19
    split: train
    text_field: text
    weight: 0.12

  - name: starcoderdata
    path: bigcode/starcoderdata
    config: python
    split: train
    text_field: content
    weight: 0.03

  - name: open-web-math
    path: open-web-math/open-web-math
    split: train
    text_field: text
    weight: 0.03

# ─────────────────────────────────────────────────────────────────────────────
# SFT (Supervised Fine-Tuning)
# ─────────────────────────────────────────────────────────────────────────────
#
# Mix aggiornato per il 2026:
#   - ultrafeedback: preferenze binarizzate di alta qualità
#   - tulu3: mix SFT curato da AllenAI, molto vario
#   - magpie_ultra: conversazioni sintetiche di alta qualità
#   - openorca: Q&A chain-of-thought, mantenuto
#
# Invariato da v0.6 — mix già ottimale per 2025-2026.

sft:

  - name: ultrafeedback
    path: HuggingFaceH4/ultrafeedback_binarized
    split: train_sft
    weight: 0.35
    structure: multiturn
    fields:
      messages: messages
      role_field: role
      content_field: content
      assistant_role: assistant

  - name: tulu3
    path: allenai/tulu-3-sft-mixture
    split: train
    weight: 0.30
    structure: multiturn
    fields:
      messages: messages
      role_field: role
      content_field: content
      assistant_role: assistant

  - name: magpie_ultra
    path: argilla/magpie-ultra-v0.1
    split: train
    weight: 0.15
    structure: pairs
    fields:
      context: instruction
      response: response

  - name: openorca
    path: Open-Orca/OpenOrca
    split: train
    weight: 0.20
    structure: pairs
    fields:
      context: [system_prompt, question]
      separator: " User: "
      response: response